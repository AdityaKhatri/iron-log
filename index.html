<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Theme -->
    <meta name="theme-color" content="#0C0B0A" />
    <meta name="color-scheme" content="dark" />

    <!-- SEO / description -->
    <meta name="description" content="Strength training tracker — raise that bar. Offline-first PWA." />
    <meta name="keywords" content="workout tracker, strength training, gym log, exercise, fitness, offline" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (social sharing + search previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Raise That Bar" />
    <meta property="og:description" content="Strength training tracker — raise that bar. Offline-first PWA." />
    <meta property="og:image" content="https://raisethatbar.com/icons/icon-512.png" />
    <meta property="og:url" content="https://raisethatbar.com/" />
    <meta property="og:site_name" content="Raise That Bar" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Raise That Bar" />
    <meta name="twitter:description" content="Strength training tracker — raise that bar. Offline-first PWA." />
    <meta name="twitter:image" content="https://raisethatbar.com/icons/icon-512.png" />

    <!-- PWA manifest -->
    <link rel="manifest" href="./manifest.webmanifest" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./icons/favicon-16.png" />

    <!-- Apple PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Raise That Bar" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />

    <title>Raise That Bar</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
